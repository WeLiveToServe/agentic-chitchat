<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhisPTT Snippet Editor</title>
  <link rel="stylesheet" href="assets/css/theme.css">
  <style>
    .editor-page {
      display: grid;
      gap: 12px;
      flex: 1;
      min-height: 0;
    }

    .editor-panel {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .editor-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .editor-textarea {
      min-height: 300px;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="top-banner">
      <img src="assets/ico-png-assets/png-logo-assets/whisptt-logo-corners-tinted.png" alt="WhisPTT logo" class="top-banner__logo">
    </header>

    <main class="screen">
      <div class="editor-page">
        <section class="editor-panel content-panel">
          <div class="status-bar">
            <span class="timer">Snippet Editor</span>
            <span class="chip chip--accent" id="editor-thread-chip">No active stack</span>
          </div>
          <p class="panel-copy" id="editor-snippet-meta">Select a snippet in the redline workspace to edit it here.</p>
          <textarea id="transcript-editor" class="editor-textarea" placeholder="Active snippet text will appear here."></textarea>
          <div class="editor-actions">
            <button class="action-button" type="button" id="save-snippet">Save Snippet</button>
            <button class="action-button" type="button" id="add-snippet">Add As New</button>
            <button class="action-button" type="button" id="open-redline">Open Redline</button>
          </div>
          <p class="status-text" id="editor-status">This page edits the latest snippet from the active stack.</p>
        </section>
      </div>
    </main>

    <nav class="bottom-nav" aria-label="Primary navigation">
      <button class="bottom-nav__item" type="button" aria-label="Agents" id="nav-chat">
        <img src="assets/svg-assets/lower-menu-svg-icons/agent-factory-nav.svg" alt="Agents" class="bottom-nav__icon">
      </button>
      <button class="bottom-nav__item" type="button" aria-label="Profile" id="nav-profile">
        <img src="assets/svg-assets/lower-menu-svg-icons/L1-profile-page-menu.svg" alt="Profile" class="bottom-nav__icon">
      </button>
      <button class="bottom-nav__item" type="button" aria-label="Recorder" id="nav-recorder">
        <img src="assets/svg-assets/lower-menu-svg-icons/C-mic-center-menu.svg" alt="Recorder" class="bottom-nav__icon">
      </button>
      <button class="bottom-nav__item bottom-nav__item--active" type="button" aria-label="Edit Transcript" id="nav-editor">
        <img src="assets/svg-assets/lower-menu-svg-icons/R1-edit-transcript-menu.svg" alt="Edit Transcript" class="bottom-nav__icon">
      </button>
      <button class="bottom-nav__item" type="button" aria-label="Android" id="nav-android">
        <img src="assets/svg-assets/lower-menu-svg-icons/R2-android-menu.svg" alt="Android" class="bottom-nav__icon">
      </button>
    </nav>
  </div>

  <script src="assets/js/editor.js"></script>
</body>
</html>
