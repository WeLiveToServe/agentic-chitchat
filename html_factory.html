<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhisPTT Agent Factory</title>
  <link rel="stylesheet" href="assets/css/theme.css">
  <style>
    .factory-shell {
      width: min(98vw, 1760px);
      min-height: min(94vh, 980px);
      border-radius: 24px;
      border: 1px solid rgba(99, 255, 131, 0.24);
      background:
        radial-gradient(circle at top left, rgba(122, 255, 244, 0.09), transparent 30%),
        radial-gradient(circle at bottom right, rgba(99, 255, 131, 0.08), transparent 28%),
        linear-gradient(180deg, rgba(7, 12, 7, 0.98), rgba(2, 4, 2, 0.98));
      box-shadow: var(--shadow-outer);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .factory-header {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 92px;
      min-height: 92px;
      max-height: 92px;
      padding: 0;
      border-bottom: 1px solid rgba(99, 255, 131, 0.14);
      background: linear-gradient(180deg, rgba(122, 255, 244, 0.1), rgba(99, 255, 131, 0.03));
    }

    .banner-center {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .banner-actions {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .banner-action-button {
      width: 78px;
      height: 78px;
      border-radius: 999px;
      border: 1px solid rgba(99, 255, 131, 0.62);
      background: linear-gradient(180deg, rgba(20, 32, 20, 0.95), rgba(7, 12, 7, 0.96));
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 26px rgba(99, 255, 131, 0.34);
      cursor: pointer;
    }

    .banner-action-button img {
      width: 44px;
      height: 44px;
      filter: brightness(0) saturate(100%) invert(86%) sepia(57%) saturate(641%) hue-rotate(66deg) brightness(105%) contrast(103%)
        drop-shadow(0 0 10px rgba(99, 255, 131, 0.88))
        drop-shadow(0 0 16px rgba(99, 255, 131, 0.48));
    }

    .banner-logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    .banner-logo {
      max-height: 92px;
      width: auto;
      object-fit: contain;
    }

    .factory-grid-shell {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(320px, 0.85fr) minmax(0, 1.2fr) minmax(340px, 0.9fr);
      gap: 12px;
      padding: 14px;
      overflow-x: auto;
    }

    .pane {
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--panel-edge);
      border-radius: 20px;
      background: var(--panel-bg);
      box-shadow: var(--shadow-panel);
    }

    .pane h2 {
      margin: 0;
      font-size: calc(0.84rem + 4pt);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--matrix-cyan);
      text-align: center;
    }

    .factory-copy {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.64;
    }

    .factory-cards {
      min-height: 0;
      overflow: auto;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .factory-card {
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(99, 255, 131, 0.12);
      background: linear-gradient(180deg, rgba(17, 24, 17, 0.95), rgba(8, 11, 8, 0.95));
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease, box-shadow 180ms ease;
      text-align: left;
      color: inherit;
    }

    .factory-card:hover,
    .factory-card:focus-visible,
    .factory-card--active {
      outline: none;
      transform: translateY(-1px);
      border-color: rgba(122, 255, 244, 0.42);
      box-shadow: 0 0 18px rgba(99, 255, 131, 0.12);
    }

    .factory-card__title {
      margin: 0 0 8px;
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .factory-card__copy {
      margin: 0;
      font-size: 0.76rem;
      line-height: 1.6;
      color: var(--text-soft);
    }

    .settings-stack {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .factory-status {
      margin: 0;
      color: var(--text-soft);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      min-height: 1.2rem;
      line-height: 1.55;
    }

    .settings-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .desktop-bottom-nav {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 14px 14px;
      border-top: 1px solid rgba(99, 255, 131, 0.12);
      background: linear-gradient(180deg, rgba(8, 12, 8, 0.82), rgba(5, 8, 5, 0.94));
    }

    .desktop-bottom-nav .bottom-nav__item {
      width: 46px;
      height: 46px;
    }

    @media (max-width: 1300px) {
      .factory-grid-shell {
        grid-template-columns: 320px minmax(720px, 1fr) minmax(340px, 0.9fr);
      }
    }
  </style>
</head>
<body>
  <div class="factory-shell">
    <header class="factory-header">
      <div class="banner-center">
        <div class="banner-logo-wrap">
          <img src="assets/ico-png-assets/png-logo-assets/whisptt-logo-corners-tinted.png" alt="WhisPTT" class="banner-logo">
        </div>
        <div class="banner-actions" aria-label="Desktop quick actions">
          <a class="banner-action-button" id="banner-chat" aria-label="Chat" href="html_chat.html" title="Open Chat">
            <img src="assets/svg-assets/lower-menu-svg-icons/L2-chat-menu.svg" alt="">
          </a>
          <a class="banner-action-button" id="banner-mic" aria-label="Mic" href="html_redline.html" title="Open Chits">
            <img src="assets/svg-assets/action-menu-svg-icons/mic-classic-radio.svg" alt="">
          </a>
          <a class="banner-action-button" id="banner-bot" aria-label="Bot" href="html_factory.html" title="Open Factory">
            <img src="assets/svg-assets/action-menu-svg-icons/robot-face-single.svg" alt="">
          </a>
        </div>
        <div class="banner-logo-wrap">
          <img src="assets/ico-png-assets/png-logo-assets/whisptt-logo-corners-tinted.png" alt="WhisPTT" class="banner-logo">
        </div>
      </div>
    </header>

    <main class="factory-grid-shell">
      <section class="pane">
        <h2>Factory</h2>
        <div class="chip-row">
          <span class="chip chip--accent" id="factory-thread-chip">No active stack</span>
          <span class="chip" id="factory-agent-chip">Gemini Flash selected</span>
        </div>
        <p class="factory-copy">
          Tune the local agent harness for the redline workspace. Gemini Flash is default. OpenClaw maps to Telegram stub until token is live.
        </p>
      </section>

      <section class="pane">
        <h2>Presets</h2>
        <div class="factory-cards" id="factory-grid"></div>
      </section>

      <section class="pane">
        <h2>Dispatch</h2>
        <div class="settings-stack">
          <label>
            <span class="panel-kicker">Send Mode</span>
            <select id="factory-input-mode">
              <option value="snippet">Active snippet</option>
              <option value="thread">Whole thread</option>
            </select>
          </label>
          <label>
            <span class="panel-kicker">Reply Mode</span>
            <select id="factory-response-mode">
              <option value="text_only">Text only</option>
              <option value="voice_text">Voice + text</option>
            </select>
          </label>
          <label>
            <span class="panel-kicker">Voice Flow</span>
            <select id="factory-auto-send">
              <option value="off">Record only</option>
              <option value="on">Push+Send after record</option>
            </select>
          </label>
          <span class="chip" id="factory-response-chip">Text only</span>
          <p class="factory-status" id="factory-status">Saved settings sync with the redline workspace through local storage.</p>
          <div class="settings-actions">
            <button class="action-button" type="button" id="open-workspace">Open Redline</button>
            <button class="action-button" type="button" id="focus-openclaw">Feature OpenClaw</button>
          </div>
        </div>
      </section>
    </main>

    <div class="desktop-bottom-nav" aria-label="Primary navigation">
      <button class="bottom-nav__item" type="button" aria-label="Relay" id="nav-chat">
        <img src="assets/svg-assets/lower-menu-svg-icons/agent-factory-nav.svg" alt="Relay" class="bottom-nav__icon">
      </button>
      <button class="bottom-nav__item" type="button" aria-label="Profile" id="nav-profile">
        <img src="assets/svg-assets/lower-menu-svg-icons/L1-profile-page-menu.svg" alt="Profile" class="bottom-nav__icon">
      </button>
      <button class="bottom-nav__item" type="button" aria-label="Recorder" id="nav-recorder">
        <img src="assets/svg-assets/lower-menu-svg-icons/C-mic-center-menu.svg" alt="Recorder" class="bottom-nav__icon">
      </button>
      <button class="bottom-nav__item bottom-nav__item--active" type="button" aria-label="Factory" id="nav-editor">
        <img src="assets/svg-assets/lower-menu-svg-icons/R1-edit-transcript-menu.svg" alt="Factory" class="bottom-nav__icon">
      </button>
      <button class="bottom-nav__item" type="button" aria-label="Android" id="nav-android">
        <img src="assets/svg-assets/lower-menu-svg-icons/R2-android-menu.svg" alt="Android" class="bottom-nav__icon">
      </button>
    </div>
  </div>

  <script src="assets/js/factory.js"></script>
</body>
</html>
