<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhisPTT Desktop Workspace</title>
  <link rel="stylesheet" href="assets/css/theme.css">
  <style>
    .desktop-shell {
      width: min(98vw, 1720px);
      min-height: min(94vh, 980px);
      border-radius: 24px;
      border: 1px solid rgba(99, 255, 131, 0.24);
      background:
        radial-gradient(circle at top right, rgba(122, 255, 244, 0.08), transparent 32%),
        linear-gradient(180deg, rgba(7, 12, 7, 0.98), rgba(2, 4, 2, 0.98));
      box-shadow: var(--shadow-outer);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .desktop-header {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 108px;
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(99, 255, 131, 0.14);
      background: linear-gradient(180deg, rgba(122, 255, 244, 0.1), rgba(99, 255, 131, 0.03));
    }

    .banner-center {
      display: flex;
      align-items: center;
      gap: 42px;
    }

    .banner-actions {
      display: flex;
      align-items: center;
      gap: 56px;
    }

    .banner-action-button {
      width: 86px;
      height: 86px;
      border-radius: 999px;
      border: 1px solid rgba(122, 255, 244, 0.5);
      background: linear-gradient(180deg, rgba(20, 32, 20, 0.95), rgba(7, 12, 7, 0.96));
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 18px rgba(122, 255, 244, 0.18);
      cursor: pointer;
    }

    .banner-action-button img {
      width: 50px;
      height: 50px;
    }

    .banner-logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    .banner-logo {
      max-height: 92px;
      width: auto;
      object-fit: contain;
    }

    .desktop-grid {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 285px minmax(0, 1fr) minmax(0, 1fr);
      gap: 12px;
      padding: 14px;
      overflow-x: auto;
    }

    .pane {
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--panel-edge);
      border-radius: 20px;
      background: var(--panel-bg);
      box-shadow: var(--shadow-panel);
    }

    .pane h2 {
      margin: 0;
      font-size: calc(0.84rem + 4pt);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--matrix-cyan);
      text-align: center;
    }

    .thread-list,
    .snippet-list {
      min-height: 0;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .snippet-separator {
      margin: 6px 0;
      color: var(--matrix-cyan);
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-align: center;
      text-shadow: 0 0 10px rgba(122, 255, 244, 0.3);
      user-select: none;
    }

    .thread-card,
    .snippet-card {
      width: 100%;
      text-align: left;
      border: 1px solid rgba(99, 255, 131, 0.14);
      border-radius: 14px;
      background: rgba(10, 14, 10, 0.9);
      color: inherit;
      padding: 10px 12px;
      cursor: pointer;
      transition: transform var(--transition-fast), border-color var(--transition-fast), box-shadow var(--transition-mid);
    }

    .thread-card:hover,
    .thread-card:focus-visible,
    .thread-card--active,
    .snippet-card:hover,
    .snippet-card:focus-visible,
    .snippet-card--active {
      outline: none;
      transform: translateY(-1px);
      border-color: rgba(122, 255, 244, 0.44);
      box-shadow: 0 0 18px rgba(99, 255, 131, 0.1);
    }

    .snippet-card--new {
      animation: snippet-pop 240ms ease-out;
    }

    .snippet-card--shifted {
      animation: snippet-shift-down 360ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    @keyframes snippet-pop {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes snippet-shift-down {
      from {
        transform: translateY(-26px);
        opacity: 0.75;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .thread-card__title,
    .snippet-card__text {
      margin: 0;
      line-height: 1.55;
      font-size: 0.82rem;
      white-space: pre-wrap;
    }

    .thread-card__title {
      text-align: center;
    }

    .thread-card__meta,
    .snippet-card__meta,
    .thread-card__preview {
      margin: 5px 0 0;
      color: var(--text-soft);
      font-size: 0.67rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .snippet-editor-wrap {
      position: relative;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
    }

    .editor-caret-hint {
      position: absolute;
      left: 30px;
      top: 78px;
      color: var(--matrix-cyan);
      font-size: 1rem;
      line-height: 1;
      pointer-events: none;
      opacity: 0;
      transition: opacity 160ms ease;
      animation: caret-blink 1s steps(1) infinite;
      z-index: 6;
    }

    .editor-caret-hint--visible {
      opacity: 0.92;
    }

    @keyframes caret-blink {
      0%, 48% {
        opacity: 1;
      }
      49%, 100% {
        opacity: 0;
      }
    }

    .snippet-title-input {
      min-height: 44px;
      padding-right: 130px;
      text-align: center;
    }

    .snippet-editor {
      min-height: 650px;
      height: 100%;
      border-radius: 16px;
      border: 1px solid rgba(122, 255, 244, 0.24);
      background: rgba(5, 8, 5, 0.9);
      color: var(--text-main);
      padding: 16px 18px 228px 18px;
      font-size: 0.96rem;
      line-height: 1.64;
      resize: none;
    }

    .pane-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .snippet-pane-actions,
    .agent-pane-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .snippet-pane-actions .action-button,
    .agent-pane-actions .action-button {
      width: 100%;
    }

    .snippet-editor-quick-actions {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 16px;
      z-index: 7;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      align-items: center;
      gap: 8px;
    }

    .snippet-editor-quick-actions .action-button {
      min-height: 36px;
      font-size: 0.63rem;
      letter-spacing: 0.1em;
      padding: 0 10px;
      white-space: nowrap;
      width: 100%;
    }

    .snippet-editor-icon-row {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 112px;
      z-index: 7;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }

    .snippet-editor-icon-row button {
      pointer-events: auto;
    }

    .snippet-editor-mini {
      width: 50px;
      height: 50px;
      border-radius: 999px;
      border: 1px solid rgba(122, 255, 244, 0.42);
      background: linear-gradient(180deg, rgba(20, 32, 20, 0.95), rgba(7, 12, 7, 0.96));
      justify-self: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .snippet-editor-mini img {
      width: 24px;
      height: 24px;
    }

    .snippet-editor-mic {
      width: 86px;
      height: 86px;
      border: 1px solid rgba(122, 255, 244, 0.52);
      background: linear-gradient(180deg, rgba(20, 32, 20, 0.95), rgba(7, 12, 7, 0.96));
      justify-self: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .snippet-editor-mic .control-button__icon {
      width: 50px;
      height: 50px;
    }

    .snippet-editor-mic {
      grid-column: auto;
      grid-row: auto;
      justify-self: center;
    }

    .agent-controls {
      display: grid;
      gap: 10px;
    }

    .agent-input {
      min-height: 168px;
      resize: vertical;
      border-radius: 14px;
      border: 1px solid rgba(122, 255, 244, 0.2);
      background: rgba(5, 8, 5, 0.86);
      color: var(--text-main);
      padding: 12px 14px;
      line-height: 1.56;
    }

    .agent-output {
      min-height: 420px;
      overflow: auto;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(122, 255, 244, 0.2);
      background: rgba(5, 8, 5, 0.82);
    }

    .pane--chats,
    .pane--chits {
      grid-template-rows: auto 1fr;
    }

    .pane--chits .snippet-editor-wrap {
      height: 100%;
    }

    .pane--chits .snippet-editor {
      min-height: 0;
      height: 100%;
    }

    .pane--chits #snippet-list,
    .pane--chits #snippet-placeholder,
    .pane--chits #editor-status {
      display: none;
    }

    .agent-output p {
      margin: 0;
      white-space: pre-wrap;
      line-height: 1.62;
      font-size: 0.9rem;
    }

    .status-inline {
      margin: 0;
      color: var(--text-soft);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      min-height: 1.1rem;
    }

    .desktop-bottom-nav {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 14px 14px;
      border-top: 1px solid rgba(99, 255, 131, 0.12);
      background: linear-gradient(180deg, rgba(8, 12, 8, 0.82), rgba(5, 8, 5, 0.94));
    }

    .desktop-bottom-nav .bottom-nav__item {
      width: 46px;
      height: 46px;
    }

    @media (max-width: 1400px) {
      .desktop-grid {
        grid-template-columns: 260px minmax(0, 1fr) minmax(0, 1fr);
      }
      .snippet-editor {
        min-height: 620px;
      }
    }

    @media (max-width: 1080px) {
      .desktop-grid {
        grid-template-columns: 240px minmax(560px, 1fr) minmax(560px, 1fr);
      }
      .snippet-editor {
        min-height: 520px;
      }
      .agent-output {
        min-height: 260px;
      }
    }
  </style>
</head>
<body>
  <div class="desktop-shell">
    <header class="desktop-header">
      <div class="banner-center">
        <div class="banner-actions" aria-label="Desktop quick actions">
          <button class="banner-action-button" type="button" id="banner-bot" aria-label="Bot">
            <img src="assets/svg-assets/lower-menu-svg-icons/agent-factory-nav.svg" alt="">
          </button>
          <button class="banner-action-button" type="button" id="banner-chat" aria-label="Chat">
            <img src="assets/svg-assets/lower-menu-svg-icons/L2-chat-menu.svg" alt="">
          </button>
          <button class="banner-action-button" type="button" id="banner-mic" aria-label="Mic">
            <img src="assets/svg-assets/action-menu-svg-icons/mic-classic-radio.svg" alt="">
          </button>
        </div>
        <div class="banner-logo-wrap">
          <img src="assets/ico-png-assets/png-logo-assets/whisptt-logo-corners-tinted.png" alt="WhisPTT" class="banner-logo">
        </div>
      </div>
      <div style="display:none;">
        <span class="chip chip--accent" id="thread-count-chip">0 stacks</span>
        <span class="chip" id="agent-pref-chip">Vanilla</span>
      </div>
    </header>

    <main class="desktop-grid">
      <section class="pane pane--chats">
        <h2>Chats</h2>
        <div class="thread-list" id="thread-list"></div>
      </section>

      <section class="pane pane--chits">
        <h2>Chits</h2>
        <div class="snippet-editor-wrap">
          <input id="thread-title-input" class="snippet-title-input" type="text" placeholder="Chat title">
          <textarea id="snippet-editor" class="snippet-editor" placeholder="Select a snippet to edit, or type text and add a new snippet."></textarea>
          <div id="editor-caret-hint" class="editor-caret-hint">|</div>
          <div class="snippet-editor-icon-row">
            <button class="snippet-editor-mini" type="button" id="snippet-copy-inline" aria-label="Copy text">
              <img src="assets/svg-assets/action-menu-svg-icons/clipboard.svg" alt="">
            </button>
            <button class="mic-button snippet-editor-mic" type="button" id="mic-button" aria-label="Record snippet">
              <img src="assets/svg-assets/action-menu-svg-icons/mic-simple.svg" class="control-button__icon control-button__icon--mic" alt="">
            </button>
            <button class="snippet-editor-mini" type="button" id="snippet-download-inline" aria-label="Download text">
              <img src="assets/svg-assets/action-menu-svg-icons/download.svg" alt="">
            </button>
          </div>
          <div class="snippet-editor-quick-actions">
            <button class="action-button" type="button" id="new-snippet-inline">New Chit</button>
            <button class="action-button" type="button" id="start-new-thread-inline">New Chat</button>
            <button class="action-button" type="button" id="push-snippet-dispatch">Push Chit to Dispatch</button>
            <button class="action-button" type="button" id="push-thread-dispatch">Push Chat to Dispatch</button>
          </div>
        </div>
        <div class="snippet-list" id="snippet-list"></div>
        <p class="transcription-placeholder" id="snippet-placeholder">Record or add text to begin.</p>
        <p class="status-inline" id="editor-status">Edits are saved in place for the selected snippet.</p>
      </section>

      <section class="pane">
        <h2>Agents</h2>
        <div class="agent-controls">
          <label>
            <span class="panel-kicker">Agent</span>
            <select id="agent-select"></select>
          </label>
          <label>
            <span class="panel-kicker">Send</span>
            <select id="input-mode-select">
              <option value="snippet">Active snippet</option>
              <option value="thread">Whole thread</option>
            </select>
          </label>
          <label>
            <span class="panel-kicker">Dispatch Input</span>
            <textarea id="agent-input" class="agent-input" placeholder="Snippet or thread text to dispatch appears here. You can paste or edit before sending."></textarea>
          </label>
        </div>
        <div class="agent-output" id="agent-output">
          <p>Agent output will appear here.</p>
        </div>
        <p class="status-inline" id="agent-status">Use local agents for current testing.</p>
      </section>
    </main>

    <div class="desktop-bottom-nav" aria-label="Primary navigation">
      <button class="bottom-nav__item" type="button" aria-label="Agents" id="nav-chat">
        <img src="assets/svg-assets/lower-menu-svg-icons/agent-factory-nav.svg" alt="Agents" class="bottom-nav__icon">
      </button>
      <button class="bottom-nav__item" type="button" aria-label="Profile" id="nav-profile">
        <img src="assets/svg-assets/lower-menu-svg-icons/L1-profile-page-menu.svg" alt="Profile" class="bottom-nav__icon">
      </button>
      <button class="bottom-nav__item bottom-nav__item--active" type="button" aria-label="Recorder" id="nav-recorder">
        <img src="assets/svg-assets/lower-menu-svg-icons/C-mic-center-menu.svg" alt="Recorder" class="bottom-nav__icon">
      </button>
      <button class="bottom-nav__item" type="button" aria-label="Edit Transcript" id="nav-editor">
        <img src="assets/svg-assets/lower-menu-svg-icons/R1-edit-transcript-menu.svg" alt="Edit Transcript" class="bottom-nav__icon">
      </button>
      <button class="bottom-nav__item" type="button" aria-label="Android" id="nav-android">
        <img src="assets/svg-assets/lower-menu-svg-icons/R2-android-menu.svg" alt="Android" class="bottom-nav__icon">
      </button>
    </div>
    <p class="status-inline" id="status-text" style="padding: 0 14px 12px;">Tap the mic to record into the active snippet stack.</p>
  </div>

  <script src="assets/js/redline_workspace.js"></script>
</body>
</html>
